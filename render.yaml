services:
  # Backend API
  - type: web
    name: procurement-bot-api
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: procurement-bot-db
          property: connectionString
      - key: PYTHONPATH
        value: .
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: EMAIL_ENABLED
        value: "false"
      - key: SENDGRID_API_KEY
        sync: false

  - type: web
    name: procure-ai-frontend
    env: static
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/dist
    envVars:
      - key: VITE_API_URL
        value: https://procure-ai-backend.onrender.com

databases:
  # PostgreSQL Database
  - name: procurement-bot-db
    databaseName: procurement_bot
    user: postgres
